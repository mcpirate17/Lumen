<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen Observability</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e14; color: #c8d0d8; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
h1 { color: #00d4ff; font-size: 18px; padding: 16px 20px; border-bottom: 1px solid #1a2030; }
h1 span { color: #555; font-weight: normal; font-size: 12px; margin-left: 12px; }

.top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px; border-bottom: 1px solid #1a2030; background: #0d1117; }
.stats { display: flex; gap: 24px; }
.stat { text-align: center; }
.stat-val { font-size: 20px; font-weight: bold; color: #00d4ff; }
.stat-label { font-size: 10px; color: #556; text-transform: uppercase; letter-spacing: 1px; }

.controls { display: flex; gap: 8px; align-items: center; }
.controls input { background: #1a2030; border: 1px solid #2a3040; color: #c8d0d8; padding: 6px 12px; border-radius: 4px; width: 300px; font-family: inherit; font-size: 13px; }
.controls button { background: #00d4ff; color: #0a0e14; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit; }
.controls button:hover { background: #00b8e0; }
.controls button.danger { background: #ff4444; color: white; }
.auto-refresh { color: #556; font-size: 11px; }
.auto-refresh input { width: auto; margin-left: 4px; }

.container { display: flex; height: calc(100vh - 120px); }
.trace-list { width: 420px; overflow-y: auto; border-right: 1px solid #1a2030; flex-shrink: 0; }
.trace-detail { flex: 1; overflow-y: auto; padding: 16px 20px; }

.trace-item { padding: 10px 16px; border-bottom: 1px solid #111820; cursor: pointer; transition: background 0.15s; }
.trace-item:hover { background: #111820; }
.trace-item.selected { background: #0d1a2a; border-left: 3px solid #00d4ff; }
.trace-item .msg { color: #e0e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
.trace-item .meta { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; color: #556; }
.trace-item .meta .model { color: #00d4ff; }
.trace-item .meta .domain { color: #ffa500; }
.trace-item .meta .latency { color: #888; }
.trace-item .meta .fail { color: #ff4444; }
.trace-item .meta .pass { color: #44ff88; }

.detail-section { margin-bottom: 20px; }
.detail-section h3 { color: #ffa500; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #1a2030; }
.detail-row { display: flex; padding: 3px 0; }
.detail-key { color: #556; width: 180px; flex-shrink: 0; }
.detail-val { color: #e0e8f0; word-break: break-word; }
.detail-val.ok { color: #44ff88; }
.detail-val.warn { color: #ffa500; }
.detail-val.fail { color: #ff4444; }
.detail-val.model { color: #00d4ff; }

.text-block { background: #111820; border: 1px solid #1a2030; border-radius: 4px; padding: 10px 14px; margin: 6px 0; white-space: pre-wrap; word-break: break-word; line-height: 1.5; max-height: 300px; overflow-y: auto; }
.text-block.response { border-left: 3px solid #00d4ff; }
.text-block.thinking { border-left: 3px solid #ffa500; color: #888; font-size: 12px; }
.text-block.system { border-left: 3px solid #556; color: #888; font-size: 12px; }
.text-block.error { border-left: 3px solid #ff4444; color: #ff6666; }

.empty { text-align: center; padding: 40px; color: #334; }
.empty p { margin-top: 8px; color: #556; font-size: 12px; }

.bar-chart { display: flex; gap: 4px; align-items: flex-end; height: 40px; margin-top: 4px; }
.bar { background: #00d4ff; border-radius: 2px 2px 0 0; min-width: 24px; text-align: center; font-size: 9px; color: #0a0e14; font-weight: bold; position: relative; }
.bar .bar-label { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); color: #556; font-size: 9px; white-space: nowrap; }
</style>
</head>
<body>

<h1>LUMEN OBSERVABILITY <span id="clock"></span></h1>

<div class="top-bar">
    <div class="stats" id="stats">
        <div class="stat"><div class="stat-val" id="st-total">-</div><div class="stat-label">Requests</div></div>
        <div class="stat"><div class="stat-val" id="st-avg">-</div><div class="stat-label">Avg ms</div></div>
        <div class="stat"><div class="stat-val" id="st-guard">-</div><div class="stat-label">Guard Fails</div></div>
        <div class="stat"><div class="stat-val" id="st-esc">-</div><div class="stat-label">Escalations</div></div>
    </div>
    <div class="controls">
        <input id="test-input" placeholder="Send test message..." />
        <button onclick="sendTest()">Send</button>
        <label class="auto-refresh">
            <input type="checkbox" id="auto-refresh" checked /> Auto-refresh 3s
        </label>
    </div>
</div>

<div class="container">
    <div class="trace-list" id="trace-list">
        <div class="empty"><p>No traces yet. Send a message to get started.</p></div>
    </div>
    <div class="trace-detail" id="trace-detail">
        <div class="empty"><p>Select a trace to view details</p></div>
    </div>
</div>

<script>
const BASE = location.origin;
let selectedTraceId = null;
let traces = [];

function fmt(ms) { return ms < 1000 ? ms + 'ms' : (ms/1000).toFixed(1) + 's'; }

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

async function fetchTraces() {
    try {
        const [tracesRes, statsRes] = await Promise.all([
            fetch(BASE + '/api/observe/traces?n=100'),
            fetch(BASE + '/api/observe/stats'),
        ]);
        traces = (await tracesRes.json()).traces;
        const stats = await statsRes.json();

        document.getElementById('st-total').textContent = stats.total_requests || 0;
        document.getElementById('st-avg').textContent = stats.avg_latency_ms ? fmt(stats.avg_latency_ms) : '-';
        document.getElementById('st-guard').textContent = stats.guardrail_fail_count || 0;
        document.getElementById('st-esc').textContent = stats.escalation_count || 0;

        renderTraceList();
        if (selectedTraceId) renderDetail(traces.find(t => t.id === selectedTraceId));
    } catch(e) {
        console.error('fetch failed', e);
    }
}

function renderTraceList() {
    const el = document.getElementById('trace-list');
    if (!traces.length) {
        el.innerHTML = '<div class="empty"><p>No traces yet. Send a message to get started.</p></div>';
        return;
    }
    el.innerHTML = traces.map(t => {
        const sel = t.id === selectedTraceId ? ' selected' : '';
        const guard = t.guardrail_safe ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>';
        return `<div class="trace-item${sel}" onclick="selectTrace(${t.id})">
            <div class="msg">#${t.id} ${esc(t.user_message)}</div>
            <div class="meta">
                <span class="model">${t.model_actual || t.model_selected}</span>
                <span class="domain">${t.domain}</span>
                <span class="latency">${fmt(t.total_latency_ms)}</span>
                ${guard}
                ${t.was_escalated ? '<span class="fail">ESC</span>' : ''}
            </div>
        </div>`;
    }).join('');
}

function selectTrace(id) {
    selectedTraceId = id;
    const trace = traces.find(t => t.id === id);
    renderTraceList();
    renderDetail(trace);
}

function renderDetail(t) {
    const el = document.getElementById('trace-detail');
    if (!t) { el.innerHTML = '<div class="empty"><p>Select a trace</p></div>'; return; }

    el.innerHTML = `
    <div class="detail-section">
        <h3>Request #${t.id}</h3>
        <div class="detail-row"><span class="detail-key">Timestamp</span><span class="detail-val">${t.timestamp}</span></div>
        <div class="detail-row"><span class="detail-key">User Message</span></div>
        <div class="text-block">${esc(t.user_message)}</div>
    </div>

    <div class="detail-section">
        <h3>Classification (Rust)</h3>
        <div class="detail-row"><span class="detail-key">Route</span><span class="detail-val model">${t.route}</span></div>
        <div class="detail-row"><span class="detail-key">Domain</span><span class="detail-val">${t.domain}</span></div>
        <div class="detail-row"><span class="detail-key">Reason</span><span class="detail-val">${t.route_reason}</span></div>
        <div class="detail-row"><span class="detail-key">Escalate?</span><span class="detail-val ${t.escalate ? 'warn' : 'ok'}">${t.escalate}</span></div>
        <div class="detail-row"><span class="detail-key">Confidence</span><span class="detail-val">${(t.confidence || 0).toFixed(2)}</span></div>
    </div>

    <div class="detail-section">
        <h3>Sentiment (Rust)</h3>
        <div class="detail-row"><span class="detail-key">Mood</span><span class="detail-val">${t.sentiment_mood}</span></div>
        <div class="detail-row"><span class="detail-key">Compound</span><span class="detail-val">${t.sentiment_compound.toFixed(3)}</span></div>
        <div class="detail-row"><span class="detail-key">Positive</span><span class="detail-val ok">${t.sentiment_pos.toFixed(2)}</span></div>
        <div class="detail-row"><span class="detail-key">Negative</span><span class="detail-val fail">${t.sentiment_neg.toFixed(2)}</span></div>
        <div class="detail-row"><span class="detail-key">Neutral</span><span class="detail-val">${t.sentiment_neu.toFixed(2)}</span></div>
    </div>

    <div class="detail-section">
        <h3>Model Selection</h3>
        <div class="detail-row"><span class="detail-key">Selected</span><span class="detail-val model">${t.model_selected}</span></div>
        <div class="detail-row"><span class="detail-key">Actual</span><span class="detail-val model">${t.model_actual}</span></div>
        <div class="detail-row"><span class="detail-key">System Prompt</span></div>
        <div class="text-block system">${esc(t.system_prompt)}</div>
    </div>

    ${t.ack_text ? `
    <div class="detail-section">
        <h3>Acknowledgment</h3>
        <div class="detail-row"><span class="detail-key">Model</span><span class="detail-val model">${t.ack_model}</span></div>
        <div class="detail-row"><span class="detail-key">Duration</span><span class="detail-val">${fmt(Math.round(t.ack_duration_ms))}</span></div>
        <div class="text-block">${esc(t.ack_text)}</div>
    </div>` : ''}

    <div class="detail-section">
        <h3>Generation</h3>
        <div class="detail-row"><span class="detail-key">Model</span><span class="detail-val model">${t.gen_model}</span></div>
        <div class="detail-row"><span class="detail-key">Tokens Generated</span><span class="detail-val">${t.gen_tokens}</span></div>
        <div class="detail-row"><span class="detail-key">Prompt Tokens</span><span class="detail-val">${t.gen_prompt_tokens}</span></div>
        <div class="detail-row"><span class="detail-key">Duration</span><span class="detail-val">${fmt(Math.round(t.gen_duration_ms))}</span></div>
        <div class="detail-row"><span class="detail-key">Tokens/sec</span><span class="detail-val">${t.gen_tokens_per_second.toFixed(1)}</span></div>
    </div>

    <div class="detail-section">
        <h3>Response</h3>
        <div class="text-block response">${esc(t.response_text)}</div>
    </div>

    ${t.response_thinking ? `
    <div class="detail-section">
        <h3>Model Thinking (hidden from user)</h3>
        <div class="text-block thinking">${esc(t.response_thinking)}</div>
    </div>` : ''}

    <div class="detail-section">
        <h3>Guardrails (Rust)</h3>
        <div class="detail-row"><span class="detail-key">Safe?</span><span class="detail-val ${t.guardrail_safe ? 'ok' : 'fail'}">${t.guardrail_safe ? 'PASS' : 'FAIL'}</span></div>
        <div class="detail-row"><span class="detail-key">Reason</span><span class="detail-val">${t.guardrail_reason}</span></div>
        <div class="detail-row"><span class="detail-key">Quality Score</span><span class="detail-val">${t.guardrail_quality.toFixed(2)}</span></div>
        <div class="detail-row"><span class="detail-key">Needs Disclaimer</span><span class="detail-val">${t.guardrail_needs_disclaimer}</span></div>
    </div>

    ${t.self_check_ran ? `
    <div class="detail-section">
        <h3>Self-Certainty Check</h3>
        <div class="detail-row"><span class="detail-key">Passed?</span><span class="detail-val ${t.self_check_passed ? 'ok' : 'fail'}">${t.self_check_passed}</span></div>
    </div>` : ''}

    ${t.was_escalated ? `
    <div class="detail-section">
        <h3>Escalation</h3>
        <div class="detail-row"><span class="detail-key">Escalated?</span><span class="detail-val warn">YES</span></div>
        <div class="detail-row"><span class="detail-key">Reason</span><span class="detail-val">${t.escalation_reason}</span></div>
    </div>` : ''}

    ${t.errors.length ? `
    <div class="detail-section">
        <h3>Errors</h3>
        ${t.errors.map(e => `<div class="text-block error">${esc(e)}</div>`).join('')}
    </div>` : ''}

    <div class="detail-section">
        <h3>Timing Breakdown</h3>
        <div class="detail-row"><span class="detail-key">Total Latency</span><span class="detail-val" style="font-size:16px;font-weight:bold;color:#00d4ff">${fmt(t.total_latency_ms)}</span></div>
        <div class="detail-row"><span class="detail-key">Ack Latency</span><span class="detail-val">${t.ack_duration_ms ? fmt(Math.round(t.ack_duration_ms)) : 'skipped'}</span></div>
        <div class="detail-row"><span class="detail-key">Generation Time</span><span class="detail-val">${fmt(Math.round(t.gen_duration_ms))}</span></div>
        <div class="detail-row"><span class="detail-key">Tokens/sec</span><span class="detail-val">${t.gen_tokens_per_second.toFixed(1)}</span></div>
        ${t.gen_duration_ms && t.gen_tokens ? `
        <div style="margin-top:8px;">
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="detail-key">Pipeline</span>
                <div style="flex:1;height:20px;display:flex;border-radius:4px;overflow:hidden;background:#111820;">
                    ${t.ack_duration_ms ? `<div style="width:${Math.min(40, t.ack_duration_ms / t.total_latency_ms * 100)}%;background:#ffa500;font-size:9px;text-align:center;line-height:20px;color:#000;">ACK</div>` : ''}
                    <div style="width:${Math.min(80, t.gen_duration_ms / t.total_latency_ms * 100)}%;background:#00d4ff;font-size:9px;text-align:center;line-height:20px;color:#000;">GEN</div>
                    <div style="flex:1;background:#1a2030;font-size:9px;text-align:center;line-height:20px;color:#556;">other</div>
                </div>
            </div>
        </div>` : ''}
    </div>
    `;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function sendTest() {
    const input = document.getElementById('test-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.placeholder = 'Sending...';
    try {
        const res = await fetch(BASE + '/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg}),
        });
        const data = await res.json();
        input.placeholder = 'Send test message...';
        await fetchTraces();
        if (data.trace_id) selectTrace(data.trace_id);
    } catch(e) {
        input.placeholder = 'Error: ' + e.message;
    }
}

document.getElementById('test-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendTest(); });

// Auto-refresh
setInterval(() => {
    if (document.getElementById('auto-refresh').checked) fetchTraces();
}, 3000);

fetchTraces();
</script>
</body>
</html>
